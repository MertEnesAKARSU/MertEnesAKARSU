          </div>

          <!-- CARD 2: Left - Education -->
          <div class="orbit-card pos-6">
            <h3 class="orbit-card-label animate-fade-down" style="animation-delay: 0.4s;">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bento-icon"><path d="M21.42 10.922a2 2 0 0 1-.019 3.838L12.83 19.22a2 2 0 0 1-1.66 0L2.6 14.76a2 2 0 0 1-.02-3.84L11.16 6.3a2 2 0 0 1 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg> Education
            </h3>
            <div class="orbit-card-stack">
              <div class="bento-card animate-bento" style="animation-delay: 0.5s;">
                <p class="bento-card-body fit-to-line" style="margin: 0; line-height: 1.8;">
                  <strong style="color: #fff;">Bachelor's in Management Information Systems (MIS)</strong><br />Anadolu University (2026)
                </p>
              </div>
              <div class="bento-card animate-bento" style="animation-delay: 0.55s;">
                <p class="bento-card-body fit-to-line" style="margin: 0; line-height: 1.8;">
                  <strong style="color: #fff;">Associate's in Computer Programming</strong><br />Dicle University (2021)
                </p>
              </div>
              <div class="bento-card animate-bento" style="animation-delay: 0.6s;">
                <p class="bento-card-body fit-to-line" style="margin: 0; line-height: 1.8;">
                  <strong style="color: #fff;">High School Diploma in IT &amp; Web Development</strong><br />İbn-i Sina Anatolian Technical High School (2017)
                </p>
              </div>
            </div>
          </div>

          <!-- CARD 3: Top Right - Experience -->
          <div class="orbit-card pos-2">
            <h3 class="orbit-card-label animate-fade-down" style="animation-delay: 0.6s;">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bento-icon"><rect width="20" height="14" x="2" y="7" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg> Experience
            </h3>
            <div class="orbit-card-stack">
              <div class="bento-card animate-bento" style="animation-delay: 0.7s;">
                <h4 style="color: #fff; font-family: 'Outfit', sans-serif; font-size: 1.1rem; margin: 0 0 0.3rem 0; font-weight: 600;">Diogenes Travel</h4>
                <p style="color: #888; font-size: 0.85rem; font-family: 'Outfit', sans-serif; margin: 0 0 0.5rem 0;">Oct 2025 - May 2026</p>
                <p class="bento-card-body" style="margin: 0; font-size: 0.95rem; line-height: 1.8;">
                  IT Consultant &amp; Full-Stack Developer. Built B2B SaaS platforms, managed agency IT infrastructure, and developed automated server backups.
                </p>
              </div>
              <div class="bento-card animate-bento" style="animation-delay: 0.75s;">
                <h4 style="color: #fff; font-family: 'Outfit', sans-serif; font-size: 1.1rem; margin: 0 0 0.3rem 0; font-weight: 600;">Tur-as Bilgisayar</h4>
                <p style="color: #888; font-size: 0.85rem; font-family: 'Outfit', sans-serif; margin: 0 0 0.5rem 0;">Sep 2018 - Jan 2021</p>
                <p class="bento-card-body" style="margin: 0; font-size: 0.95rem; line-height: 1.8;">
                  IT Field Support Specialist. Handled on-site crisis management, network deployment, and motherboard-level hardware repairs.
                </p>
              </div>
            </div>
          </div>

          <!-- CARD 6: Mid Right - Certifications -->
          <div class="orbit-card pos-3">
            <h3 class="orbit-card-label animate-fade-down" style="animation-delay: 0.8s;">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="bento-icon"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg> Certifications
            </h3>
            <div class="orbit-card-stack">
              <div class="bento-card animate-bento" style="animation-delay: 0.9s;">
                <span style="font-size: 0.95rem; line-height: 1.4; color: #ccc; font-family: 'Outfit', sans-serif; display: block;">AI4FUTURE Fundamentals (IBM)</span>
